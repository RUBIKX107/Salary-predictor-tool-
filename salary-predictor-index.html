<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalaryIQ — AI Salary Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --card: #13131c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(0,229,160,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 80%, rgba(124,58,237,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.25);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, #00b8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.6;
  }

  /* Form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  input, select, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
  }

  select option { background: #1a1a28; }

  textarea {
    resize: vertical;
    min-height: 90px;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  /* Slider */
  .slider-wrap { display: flex; flex-direction: column; gap: 8px; }
  .slider-labels { display: flex; justify-content: space-between; }
  .slider-val {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 0.9rem;
    font-weight: 400;
  }

  input[type="range"] {
    -webkit-appearance: none;
    padding: 0;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    border: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.2);
    cursor: pointer;
  }

  .btn {
    width: 100%;
    padding: 16px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    margin-top: 24px;
    background: linear-gradient(135deg, var(--accent) 0%, #00c9a7 100%);
    color: #0a0a0f;
    position: relative;
    overflow: hidden;
  }

  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,229,160,0.3); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    display: none;
    animation: slideUp 0.4s ease;
  }

  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .salary-display {
    text-align: center;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .salary-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .salary-range {
    font-size: clamp(2rem, 7vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), #00b8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }

  .salary-median {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  .insight-section h3 {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .insight-text {
    color: #c8c8dc;
    font-size: 0.95rem;
    line-height: 1.75;
    font-weight: 400;
  }

  .insight-text p { margin-bottom: 12px; }
  .insight-text p:last-child { margin-bottom: 0; }

  .factors {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .factor-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }

  .factor-pos { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); color: var(--accent); }
  .factor-neg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
  .factor-neu { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); color: #a78bfa; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: #f87171;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    margin-top: 16px;
    display: none;
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 520px) {
    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .form-card, .result-card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">Powered by Claude AI</div>
    <h1>Know Your<br><span>Market Worth</span></h1>
    <p class="subtitle">Enter your profile — our AI analyzes your skills, experience & market trends to predict a realistic salary range.</p>
  </header>

  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Job Title / Role</label>
        <input type="text" id="role" placeholder="e.g. Senior Product Manager" />
      </div>

      <div class="field">
        <label>Industry</label>
        <select id="industry">
          <option value="">Select industry…</option>
          <option>Technology / Software</option>
          <option>Finance & Banking</option>
          <option>Healthcare</option>
          <option>E-commerce & Retail</option>
          <option>Consulting</option>
          <option>Media & Entertainment</option>
          <option>Manufacturing</option>
          <option>Education</option>
          <option>Government & Public Sector</option>
          <option>Startups / VC-backed</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label>Location / Country</label>
        <input type="text" id="location" placeholder="e.g. New York, USA" />
      </div>

      <div class="field">
        <label>Company Size</label>
        <select id="company_size">
          <option value="">Select size…</option>
          <option>Startup (1–50)</option>
          <option>Small (51–200)</option>
          <option>Mid-size (201–1000)</option>
          <option>Large (1001–5000)</option>
          <option>Enterprise (5000+)</option>
        </select>
      </div>

      <div class="field full slider-wrap">
        <label>Years of Experience</label>
        <div class="slider-labels">
          <span style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace">0 yrs</span>
          <span class="slider-val" id="exp-val">5 years</span>
          <span style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace">30 yrs</span>
        </div>
        <input type="range" id="experience" min="0" max="30" value="5"
          oninput="document.getElementById('exp-val').textContent = this.value + (this.value==1?' year':' years')">
      </div>

      <div class="field full">
        <label>Education Level</label>
        <select id="education">
          <option value="">Select level…</option>
          <option>High School Diploma</option>
          <option>Associate Degree</option>
          <option>Bachelor's Degree</option>
          <option>Master's Degree</option>
          <option>MBA</option>
          <option>PhD / Doctorate</option>
          <option>Professional Certification</option>
          <option>Self-taught / Bootcamp</option>
        </select>
      </div>

      <div class="field full">
        <label>Key Skills & Tech Stack (optional)</label>
        <textarea id="skills" placeholder="e.g. Python, machine learning, AWS, 3 years with LLMs, team leadership…"></textarea>
      </div>
    </div>

    <button class="btn" id="predict-btn" onclick="predict()">
      Predict My Salary
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="result-card" id="result-card">
    <div class="salary-display">
      <div class="salary-label">Estimated Annual Salary Range</div>
      <div class="salary-range" id="salary-range">—</div>
      <div class="salary-median" id="salary-median"></div>
    </div>
    <div class="insight-section">
      <h3>AI Analysis</h3>
      <div class="insight-text" id="insight-text"></div>
      <div class="factors" id="factors"></div>
    </div>
  </div>
</div>

<script>
async function predict() {
  const role = document.getElementById('role').value.trim();
  const industry = document.getElementById('industry').value;
  const location = document.getElementById('location').value.trim();
  const company_size = document.getElementById('company_size').value;
  const experience = document.getElementById('experience').value;
  const education = document.getElementById('education').value;
  const skills = document.getElementById('skills').value.trim();

  const err = document.getElementById('error-msg');
  err.style.display = 'none';

  if (!role || !industry || !location) {
    err.textContent = '⚠ Please fill in Role, Industry, and Location to continue.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('predict-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing your profile…';
  document.getElementById('result-card').classList.remove('visible');

  const prompt = `You are a senior compensation analyst and career strategist with deep knowledge of global salary benchmarks across industries.

Analyze this professional profile and return a realistic salary prediction:

- Role/Title: ${role}
- Industry: ${industry}
- Location: ${location}
- Company Size: ${company_size || 'not specified'}
- Years of Experience: ${experience}
- Education: ${education || 'not specified'}
- Key Skills: ${skills || 'not specified'}

Respond ONLY with a valid JSON object (no markdown, no extra text) in this exact format:
{
  "low": number (annual salary low in USD, integer),
  "high": number (annual salary high in USD, integer),
  "median": number (annual salary median in USD, integer),
  "currency_note": "string (e.g. 'Estimated in USD. Local purchasing power may vary.' or currency conversion note)",
  "analysis": "string (3–4 short paragraphs: overview of market rate, key salary drivers for this profile, growth outlook and negotiation advice)",
  "positive_factors": ["factor1", "factor2", "factor3"],
  "negative_factors": ["factor1", "factor2"],
  "neutral_factors": ["factor1"]
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // Format salary
    const fmt = n => '$' + n.toLocaleString('en-US');
    document.getElementById('salary-range').textContent = `${fmt(result.low)} – ${fmt(result.high)}`;
    document.getElementById('salary-median').textContent = `Median: ${fmt(result.median)} / year  ·  ${result.currency_note}`;

    // Analysis paragraphs
    const paragraphs = result.analysis.split(/\n+/).filter(Boolean);
    document.getElementById('insight-text').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

    // Factor tags
    const fDiv = document.getElementById('factors');
    fDiv.innerHTML = '';
    (result.positive_factors || []).forEach(f => fDiv.innerHTML += `<span class="factor-tag factor-pos">↑ ${f}</span>`);
    (result.negative_factors || []).forEach(f => fDiv.innerHTML += `<span class="factor-tag factor-neg">↓ ${f}</span>`);
    (result.neutral_factors || []).forEach(f => fDiv.innerHTML += `<span class="factor-tag factor-neu">• ${f}</span>`);

    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    err.textContent = '⚠ Error: ' + (e.message || 'Something went wrong. Please try again.');
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Predict My Salary';
  }
}
</script>
</body>
</html>
